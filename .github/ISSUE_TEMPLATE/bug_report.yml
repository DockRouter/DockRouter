name: Bug Report
description: Report a bug to help us improve
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is
      placeholder: "When I do X, Y happens instead of Z..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this behavior?
      placeholder: |
        1. Start DockRouter with '...'
        2. Deploy container with labels '...'
        3. Make request to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant log output (set DR_LOG_LEVEL=debug)
      render: shell

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Your docker-compose.yml or container labels
      render: yaml

  - type: input
    id: version
    attributes:
      label: DockRouter Version
      description: What version are you running?
      placeholder: "v1.0.0 or commit hash"
    validations:
      required: true

  - type: input
    id: docker
    attributes:
      label: Docker Version
      placeholder: "24.0.7"

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "Ubuntu 22.04 / macOS 14 / Windows 11"
