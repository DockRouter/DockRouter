# Test Environment for DockRouter
#
# Usage:
#   1. Add to C:\Windows\System32\drivers\etc\hosts:
#      127.0.0.1 api.test.local web.test.local admin.test.local test.local lb.test.local
#   2. docker-compose up -d
#   3. Test endpoints:
#      curl http://api.test.local
#      curl http://web.test.local
#      curl http://lb.test.local (multiple requests show load balancing)
#      Open http://localhost:9090 (admin dashboard)

services:
  # Build DockRouter from local source
  dockrouter:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: dockrouter-test
    ports:
      - "80:80"
      - "443:443"
      - "9090:9090"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DR_LOG_LEVEL=debug
      - DR_ACCESS_LOG=true
      - DR_ADMIN_BIND=0.0.0.0
      - DR_DEFAULT_TLS=off
    restart: unless-stopped
    networks:
      - test-net

  # API Backend
  api:
    image: hashicorp/http-echo:latest
    container_name: api-test
    labels:
      dr.enable: "true"
      dr.host: "api.test.local"
      dr.port: "5678"
      dr.ratelimit: "100/m"
      dr.cors.origins: "*"
    command: ["-text={\"status\":\"ok\",\"service\":\"api\",\"message\":\"Hello from DockRouter!\"}"]
    networks:
      - test-net
    restart: unless-stopped

  # Web Backend
  web:
    image: hashicorp/http-echo:latest
    container_name: web-test
    labels:
      dr.enable: "true"
      dr.host: "web.test.local"
      dr.port: "5678"
      dr.compress: "true"
    command: ["-text=<html><head><title>DockRouter Test</title></head><body style='background:#1a1a2e;color:#eee;font-family:system-ui;display:flex;align-items:center;justify-content:center;height:100vh;margin:0'><div style='text-align:center'><h1>DockRouter</h1><p>Web service is working!</p><code style='background:#333;padding:8px 16px;border-radius:4px'>Host: web.test.local</code></div></body></html>"]
    networks:
      - test-net
    restart: unless-stopped

  # Admin Panel (protected)
  admin:
    image: hashicorp/http-echo:latest
    container_name: admin-test
    labels:
      dr.enable: "true"
      dr.host: "admin.test.local"
      dr.port: "5678"
      # Basic auth: user=admin, pass=admin123
      dr.auth.basic.users: "admin:$2a$10$N9qo8uLOickgx2ZMRZoMyeIjZRGdjGj/n3ySBKfP0rqOqUHZqvEqK"
    command: ["-text=<html><head><title>Admin</title></head><body style='background:#0f0f23;color:#eee;font-family:system-ui;display:flex;align-items:center;justify-content:center;height:100vh;margin:0'><div style='text-align:center'><h1>Admin Panel</h1><p>Basic auth working!</p><code>user: admin / pass: admin123</code></div></body></html>"]
    networks:
      - test-net
    restart: unless-stopped

  # Path-based routing test
  api-v1:
    image: hashicorp/http-echo:latest
    container_name: api-v1-test
    labels:
      dr.enable: "true"
      dr.host: "test.local"
      dr.path: "/api/v1"
      dr.port: "5678"
      dr.stripprefix: "/api/v1"
    command: ["-text={\"version\":\"v1\",\"message\":\"API v1 endpoint\"}"]
    networks:
      - test-net
    restart: unless-stopped

  api-v2:
    image: hashicorp/http-echo:latest
    container_name: api-v2-test
    labels:
      dr.enable: "true"
      dr.host: "test.local"
      dr.path: "/api/v2"
      dr.port: "5678"
      dr.stripprefix: "/api/v2"
    command: ["-text={\"version\":\"v2\",\"message\":\"API v2 endpoint\"}"]
    networks:
      - test-net
    restart: unless-stopped

  # Load balancing test (weighted)
  lb-backend-1:
    image: hashicorp/http-echo:latest
    container_name: lb-backend-1
    labels:
      dr.enable: "true"
      dr.host: "lb.test.local"
      dr.port: "5678"
      dr.loadbalancer: "weighted"
      dr.weight: "5"
    command: ["-text={\"backend\":\"1\",\"weight\":5}"]
    networks:
      - test-net
    restart: unless-stopped

  lb-backend-2:
    image: hashicorp/http-echo:latest
    container_name: lb-backend-2
    labels:
      dr.enable: "true"
      dr.host: "lb.test.local"
      dr.port: "5678"
      dr.loadbalancer: "weighted"
      dr.weight: "3"
    command: ["-text={\"backend\":\"2\",\"weight\":3}"]
    networks:
      - test-net
    restart: unless-stopped

  lb-backend-3:
    image: hashicorp/http-echo:latest
    container_name: lb-backend-3
    labels:
      dr.enable: "true"
      dr.host: "lb.test.local"
      dr.port: "5678"
      dr.loadbalancer: "weighted"
      dr.weight: "2"
    command: ["-text={\"backend\":\"3\",\"weight\":2}"]
    networks:
      - test-net
    restart: unless-stopped

networks:
  test-net:
    driver: bridge
